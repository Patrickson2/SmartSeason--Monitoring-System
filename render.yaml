services:
  - type: web
    name: smartseason-api
    runtime: python
    pythonVersion: 3.12.0
    rootDir: Backend
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./smartseason.db
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: ADMIN_EMAIL
        value: admin@smartseason.com
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_NAME
        value: SmartSeason Admin
      - key: ALLOWED_ORIGINS
        value: ""
